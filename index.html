<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <!-- viewport: la app se adapta al ancho del celular (mobile-first) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#5a2a4d" />
  <title>TopStyle — Armá tu pedido</title>

  <link rel="stylesheet" href="css/styles.css" />

  <!-- Nuestra lógica Alpine. Va ANTES del script de Alpine: registra el
       componente 'app' escuchando el evento alpine:init, que Alpine dispara
       al arrancar. Ambos con 'defer', así que se ejecutan en orden. -->
  <script defer src="js/app.js"></script>
  <!-- Alpine.js por CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>

<!-- x-data="app": el estado y la lógica viven en js/app.js -->
<body x-data="app">

  <!-- ===================================================
       PANTALLA 1: INICIO (versión primera visita)
       =================================================== -->
  <div class="contenedor" x-show="pantalla === 'inicio'">
    <main class="inicio">

      <img class="inicio__logo" src="assets/topstyle-logo.png"
           alt="TopStyle — Professional Hair Stylist Products" />

      <div class="inicio__centro">
        <h1 class="inicio__saludo">Bienvenido a TopStyle</h1>
        <p class="inicio__propuesta">Armá tu pedido en 2 minutos y mandánoslo listo por WhatsApp.</p>

        <!-- Campo opcional de nombre. No persiste todavía (Paso 9). -->
        <div class="campo-nombre">
          <label class="campo-nombre__label" for="nombre">¿Cómo te llamamos?</label>
          <input class="campo-nombre__input" id="nombre" type="text"
                 x-model="nombre" placeholder="Tu nombre (opcional)" autocomplete="off" />
        </div>

        <button class="btn-principal" @click="pantalla = 'catalogo'">
          Empezar pedido
        </button>
      </div>

      <!-- Footer: links a los PDFs (ya hospedados en el repo) -->
      <footer class="footer-pdfs">
        <p class="footer-pdfs__titulo">Catálogos y cartas de color</p>
        <div class="footer-pdfs__lista">
          <a class="pdf-link" href="assets/pdfs/catalogo-question.pdf" target="_blank" rel="noopener">
            <span>Catálogo Question</span><span class="pdf-link__estado">PDF ↗</span>
          </a>
          <a class="pdf-link" href="assets/pdfs/catalogo-beauty.pdf" target="_blank" rel="noopener">
            <span>Catálogo Beauty Color</span><span class="pdf-link__estado">PDF ↗</span>
          </a>
          <a class="pdf-link" href="assets/pdfs/carta-color-question.pdf" target="_blank" rel="noopener">
            <span>Carta de color Question Coloration</span><span class="pdf-link__estado">PDF ↗</span>
          </a>
          <a class="pdf-link" href="assets/pdfs/carta-lumiplex.pdf" target="_blank" rel="noopener">
            <span>Carta Lumiplex</span><span class="pdf-link__estado">PDF ↗</span>
          </a>
        </div>
      </footer>

      <p class="version">Paso 3 · build 2026-06-03 01:10</p>
    </main>
  </div>

  <!-- ===================================================
       PANTALLA 2: CATÁLOGO
       Render del grid agrupado por línea. En este paso los tabs y el
       buscador están presentes pero inertes (se conectan en el Paso 4),
       y el botón de agregar todavía no hace nada (Paso 5/6).
       =================================================== -->
  <div class="catalogo" x-show="pantalla === 'catalogo'" x-cloak>

    <!-- Header sticky: volver + buscador (inerte por ahora) -->
    <header class="cat-header">
      <button class="cat-volver" @click="pantalla = 'inicio'" aria-label="Volver al inicio">←</button>
      <input class="cat-buscador" type="search" placeholder="Buscar producto…" disabled
             aria-label="Buscar (se activa en el próximo paso)" />
    </header>

    <!-- Tabs principales (inertes en este paso) -->
    <nav class="cat-tabs" aria-label="Líneas de producto">
      <template x-for="t in tabs" :key="t.key">
        <button class="cat-tab" :class="{ 'is-active': tabActivo === t.key }"
                x-text="t.label"></button>
      </template>
    </nav>

    <!-- Cuerpo: secciones por línea -->
    <div class="cat-body">
      <template x-for="linea in lineas" :key="linea.key">
        <section class="cat-seccion">
          <h2 class="cat-seccion__titulo" x-text="linea.label"></h2>

          <!-- Beauty Color: agrupado en sub-líneas -->
          <template x-if="linea.key === 'beautycolor'">
            <div>
              <template x-for="sub in subBeauty" :key="sub">
                <div class="cat-sub">
                  <h3 class="cat-sub__titulo" x-text="sub"></h3>
                  <div class="cat-grid">
                    <template x-for="p in productosDeSublinea(sub)" :key="p.id">
                      <article class="card">
                        <div class="card__foto">
                          <img :src="p.imagen" :alt="p.nombre" loading="lazy" />
                        </div>
                        <div class="card__info">
                          <p class="card__nombre" x-text="p.nombre"></p>
                          <p class="card__marca" x-text="p.marca"></p>
                        </div>
                        <button class="card__add" disabled
                                :class="{ 'card__add--tono': p.requiereVariante }"
                                x-text="p.requiereVariante ? 'Elegir tono' : '+'"></button>
                      </article>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <!-- Resto de líneas: grid directo -->
          <template x-if="linea.key !== 'beautycolor'">
            <div class="cat-grid">
              <template x-for="p in productosDeLinea(linea.key)" :key="p.id">
                <article class="card">
                  <div class="card__foto">
                    <img :src="p.imagen" :alt="p.nombre" loading="lazy" />
                  </div>
                  <div class="card__info">
                    <p class="card__nombre" x-text="p.nombre"></p>
                    <p class="card__marca" x-text="p.marca"></p>
                  </div>
                  <button class="card__add" disabled
                          :class="{ 'card__add--tono': p.requiereVariante }"
                          x-text="p.requiereVariante ? 'Elegir tono' : '+'"></button>
                </article>
              </template>
            </div>
          </template>
        </section>
      </template>
    </div>

    <!-- Footer fijo: contador + ver pedido (inertes, Paso 5/7) -->
    <footer class="cat-footer">
      <span class="cat-footer__contador">0 productos en tu pedido</span>
      <button class="cat-footer__ver" disabled>Ver pedido</button>
    </footer>
  </div>

</body>
</html>
